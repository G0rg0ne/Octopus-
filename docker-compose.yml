services:
  vllm:
    build:
      context: .
    image: octopus-vllm:qwen0.5b
    ports:
      - "8000:8000"
    command:
      - "${VLLM_MODEL:-Qwen/Qwen2.5-0.5B-Instruct}"
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --gpu-memory-utilization
      - "${VLLM_GPU_MEMORY_UTILIZATION:-0.6}"
      - --max-model-len
      - "${VLLM_MAX_MODEL_LEN:-2048}"
      - --max-num-seqs
      - "${VLLM_MAX_NUM_SEQS:-8}"
      - --tensor-parallel-size
      - "${VLLM_TENSOR_PARALLEL_SIZE:-1}"
      - --kv-cache-metrics
      - --kv-cache-metrics-sample
      - "${VLLM_KV_CACHE_METRICS_SAMPLE:-0.7}"
    environment:
      HF_TOKEN: "${HF_TOKEN}"
      HF_HOME: /data/hf
      HUGGINGFACE_HUB_CACHE: /data/hf/hub
      TRANSFORMERS_CACHE: /data/hf/transformers
      # Helps reduce CUDA allocator fragmentation (common on long-running servers).
      PYTORCH_CUDA_ALLOC_CONF: "${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}"
    env_file:
      - .env
    volumes:
      - hf-cache:/data/hf
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  api:
    build:
      context: ./backend
    image: octopus-api-gateway:dev
    depends_on:
      - vllm
    ports:
      - "8080:8080"
    environment:
      VLLM_BASE_URL: "http://vllm:8000"
      API_KEY: "${API_KEY:-dev-key}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    env_file:
      - .env

  prometheus:
    image: prom/prometheus:latest
    depends_on:
      - vllm
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro

volumes:
  hf-cache:
  grafana-data:
