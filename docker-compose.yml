services:
  vllm:
    build:
      context: .
    image: octopus-vllm:mistral-nemo-awq
    ports:
      - "8000:8000"
    command:
      - "${VLLM_MODEL:-casperhansen/mistral-nemo-instruct-2407-awq}"
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --quantization
      - "${VLLM_QUANTIZATION:-awq}"
      - --gpu-memory-utilization
      - "${VLLM_GPU_MEMORY_UTILIZATION:-0.88}"
      - --max-model-len
      - "${VLLM_MAX_MODEL_LEN:-4096}"
      - --max-num-seqs
      - "${VLLM_MAX_NUM_SEQS:-4}"
      - --tensor-parallel-size
      - "${VLLM_TENSOR_PARALLEL_SIZE:-1}"
    environment:
      # Frees reserved memory used for CUDA graph profiling (vLLM 0.21+); helps tight VRAM.
      VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: "${VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS:-0}"
      HF_TOKEN: "${HF_TOKEN:-}"
      HF_HOME: /data/hf
      HUGGINGFACE_HUB_CACHE: /data/hf/hub
      TRANSFORMERS_CACHE: /data/hf/transformers
      PYTORCH_CUDA_ALLOC_CONF: "${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}"
    env_file:
      - path: .env
        required: false
    volumes:
      - hf-cache:/data/hf
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  hf-cache:
